<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/logint.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <link rel="icon" type="image/x-icon" href="assets/img/icon.png">
    <title>Login Mydo</title>
</head>
<body>
    <nav class="navbar-brand">
        <a href="index.html">
            <img src="assets/img/logo.png" alt="">
        </a>
    </nav>
<div class="container" id="container">
    <div class="form-container sign-up-container">
        <form action="#">
            <h1>Register</h1>
            <div class="social-container">
                <a href="https://id-id.facebook.com/" class="social"><i class="bi bi-facebook"></i></i></a>
                <a href="https://accounts.google.com/" class="social"><i class="bi bi-google"></i></i></a>
                <a href="https://www.linkedin.com/" class="social"><i class="bi bi-linkedin"></i></a>
            </div>
            <span class="atau">atau gunakan metode lain</span>
            <input  class="container-input" type="text" placeholder="Nama Lengkap" />
            <input  class="container-input" type="text" placeholder="Nomor Telepon" />
            <input  class="container-input" type="email" placeholder="Email" />
            <input  class="container-input" type="password" placeholder="Kata Sandi" />
            <button class="custbtn" ><a href="profile.html">Daftar</a></button>
        </form>
    </div>
    <div class="form-container sign-in-container">
        <form action="#">
            <h1>Login</h1>
            <div class="social-container">
                <a href="#" class="social"><i class="bi bi-facebook"></i></i></a>
                <a href="#" class="social"><i class="bi bi-google"></i></i></a>
                <a href="#" class="social"><i class="bi bi-linkedin"></i></a>
            </div>
            <span class="atau">atau gunakan metode lain</span>
            <input class="container-input" type="email" placeholder="Email" />
            <input class="container-input" type="password" placeholder="Kata Sandi" />
            <div class="row justify-content-between">
                <div class="col-auto" style="padding-left: 0px; padding-right: 0px;">
                  <div class="form-check align-items-start">
                    <input class="form-check-input container-check" type="checkbox" id="rememberMe">
                    <label class="form-check-label" for="rememberMe">Remember me</label>
                  </div>
                </div>
                <div class="col-auto" style="padding-left: 0px; padding-right: 0px;">
                  <a href="#" class="forgotpw align-items-end">Lupa Sandi</a>
                </div>
            </div>
            <button class="custbtn" href="profile.html" ><a href="profile.html">Sign In</a></button>
        </form>
    </div>
    <div class="overlay-container">
        <div class="overlay">
            <div class="overlay-panel overlay-left">
                <h1>Sudah memiliki akun?</h1>
                <p>Lanjutkan aksimu dengan Login disini</p>
                <button class="ghost custbtn" id="signIn">Sign In</button>
            </div>
            <div class="overlay-panel overlay-right">
                <h1>Belum Daftar?</h1>
                <p>Daftarkan diri dan partisipasi dalam aksi nyata Mydo</p>
                <button class="ghost custbtn" id="signUp">Sign Up</button>
            </div>
        </div>
    </div>
</div>

<script>
    const signUpButton = document.getElementById('signUp');
    const signInButton = document.getElementById('signIn');
    const container = document.getElementById('container');

    signUpButton.addEventListener('click', () => {
        container.classList.add("right-panel-active");
    });

    signInButton.addEventListener('click', () => {
        container.classList.remove("right-panel-active");
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
